[features]
seeds = false
skip-lint = false

[programs.mainnet]
pigeon_burn_router = "REPLACE_WITH_YOUR_PROGRAM_ID"

[programs.devnet]
pigeon_burn_router = "REPLACE_WITH_YOUR_PROGRAM_ID"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "mainnet"
